<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily AI Brief — AI Builders Digest</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="container">
      <nav class="nav">
        <div class="logo">
          <span class="logo-icon">◈</span>
          <span class="logo-text">Daily AI Brief</span>
        </div>
        <div class="nav-links">
          <a href="#" class="nav-link active" data-view="today">今日</a>
          <a href="#" class="nav-link" data-view="archive">历史</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <section id="today-view" class="view active">
        <div class="hero">
          <p class="hero-date" id="today-date"></p>
          <h1 class="hero-title">AI Builders Digest</h1>
          <p class="hero-subtitle">追踪 AI 领域顶尖 Builder 的最新思考与动态</p>
        </div>
        <div id="today-content" class="digest-content">
          <div class="loading">
            <div class="loading-spinner"></div>
            <p>加载中...</p>
          </div>
        </div>
      </section>

      <section id="archive-view" class="view">
        <div class="hero">
          <h1 class="hero-title">历史日报</h1>
          <p class="hero-subtitle">查看过往的 AI Builders Digest</p>
        </div>
        <div id="archive-list" class="archive-list"></div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>Powered by <a href="https://github.com/zarazhangrui/follow-builders" target="_blank">Follow Builders</a> · 
         Generated by <a href="https://github.com/qing-wq/daily-ai-brief" target="_blank">Daily AI Brief</a></p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
