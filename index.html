  <script id="digest-data" type="application/json">"# AI Builders Digest — 2026年4月9日星期四\n\n追踪 AI 领域顶尖 Builder 的最新思考与动态\n\n---\n\n## X / Twitter\n\n**Swyx** — achieve ambition with intentionality, intensity, integrity & insanity.\n\n@jackbutcher @thisiskp_ @danlovesproofs @bfirsh @akshat_b here is @simonw on the difference in self evident naming between “prompt injection” and “lethal trifecta”\n\nhttps://t.co/wSSVgEZeWM https://t.co/ovDqwQRvq5\nhttps://x.com/swyx/status/2041739250421436591\n\nok amazon i see you \n\n- https://t.co/j57n1RekB4\n- https://t.co/PKU3KC9cW0\n\n(wew i'm actually going to try this)\nhttps://x.com/swyx/status/2041675995665612954\n\n@latentspacepod @_lopopolo @OpenAI we didnt get a chance to pod with Alex yet but i am making damn sure to assign due credit!!!\n\nhttps://t.co/GC59IzgvQf https://t.co/AOEUeZD7Ms\nhttps://x.com/swyx/status/2041568051041063118\n\n**Kevin Weil** — VP Science @OpenAI, BoD @Cisco @nature_org, LTC @USArmyReserve\n\nBtw: @hemal built this as a simple skill in a few hours, since Prism is powered by Codex. More to come.\n\nAnd if you love the idea of building AI-native products to accelerate science, we're hiring a lead designer for Prism: apply here! https://t.co/Tt9MgzHxnO https://t.co/DgY3q5Tm5L\nhttps://x.com/kevinweil/status/2041592093718749659\n\nTry it out at https://t.co/4MBs45PNiU today and let me know what you think!\nhttps://x.com/kevinweil/status/2041573804145799346\n\nPaper Review is built to act more like a careful technical reviewer than a grammar checker. It looks for issues in math, derivations, notation, units, structure, and whether a paper’s claims are actually supported by the results. It also catches inconsistencies across sections, figures, tables, captions, and appendices. The goal is to help authors strengthen technical rigor and correctness before submission.\n\nInside Prism, it runs as a structured workflow and writes its output as an editable LaTeX review file directly in the project. That means the review becomes part of the paper workspace itself, so authors can revise and work through feedback in the same environment as the manuscript. It also flags unclear phrasing, citation issues, and proofreading mistakes before submission.\nhttps://x.com/kevinweil/status/2041573802212303053\n\n**Peter Yang** — I share extremely practical AI tutorials and interviews | Join 140K+ readers at https://t.co/XYKTmGVH14 | Product at Roblox\n\nGood initiative - I’m curious if Anthropic has been using mythos internally to ship at their recent insane velocity. https://t.co/378d3TuWbd\nhttps://x.com/petergyang/status/2041678988318543908\n\nSo nice that I had to run around the entire lake https://t.co/tTEbGSe9uG\nhttps://x.com/petergyang/status/2041653240828448820\n\n**Nan Yu** — head of product @linear\n\nMany designers and eng. do well when you ask them to think through product questions in abstract. \n\nBut you have to take away the IDE/figma or they tend to dive right into coding/designing exactly what was asked for. \n\nMore designers should become PMs. They’d be good at it. https://t.co/45aqy8KTsE\nhttps://x.com/thenanyu/status/2041495924682244275\n\n**Cat Wu** — claude code + cowork @anthropicai, prev: @dagster, @scale_ai\n\nRun /powerup to learn our team's favorite Claude Code CLI features! https://t.co/zPOta7pTP4\nhttps://x.com/_catwu/status/2041655441864978552\n\n**Thariq** — Claude Code @anthropicai.   prev YC W20, mit media lab. \n\ndone about 10 of these calls so far + looked at more transcripts\n\nmany learnings but one of the biggest is that it's very easy to spend a lot of tokens on open ended verification that doesn't make your output better\n\nI'll try and write more on how to do it efficiently https://t.co/VrBGOFDhIF\nhttps://x.com/trq212/status/2041722125510377705\n\nDoing a workshop on my technical writing process in SF in 2 weeks, hosted by friends @MilksandMatcha and @swyx. \n\nWould love to see you there! Link below. https://t.co/APf3KcFNBy\nhttps://x.com/trq212/status/2041677067117588871\n\n**Guillermo Rauch** — @vercel CEO\n\nAlways a pleasure to speak at @ycombinator. More bullish than ever. Exceptional founders. Best city, best time, best opportunity to build in generations. https://t.co/YWjCu3Ldo6\nhttps://x.com/rauchg/status/2041720266154504351\n\n**Alex Albert** — Research @AnthropicAI. Opinions are my own!\n\nMythos Preview is currently available to our launch partners in Project Glasswing. Learn more about the model and the project here: https://t.co/eagt68oUPj\nhttps://x.com/alexalbert__/status/2041579950332113155\n\nWe released Claude Opus 4.6 just two months ago. Today we're sharing some info on our new model, Claude Mythos Preview. https://t.co/Dz6um6HAWZ\nhttps://x.com/alexalbert__/status/2041579938537775160\n\nGlasswing is possibly the most consequential event in the AI industry I've seen up close since joining Anthropic almost 3 years ago. It feels like we're at a turning point in history. https://t.co/prjQaH7kQ8\nhttps://x.com/alexalbert__/status/2041578743769280811\n\n**Aaron Levie** — ceo @box - your business lives in content. unleash it with AI\n\nMythos from Anthropic is another clear reminder that there’s absolutely no wall in model capability progress right now. Meaningful double digit gains on critical benchmarks, and it appears we’re going to keep up getting insane gains from the other labs.\n\nAnd as coding and tool use goes, so goes agentic workflows. Most knowledge automation is gated by some degree of models being able to reason through complicated tasks, use the right tools to work with data, have access to the right context, and be able to leverage skills and write code to work with and verify that data, and more. \n\nThe capability slope we’re going to keep seeing from the frontier labs is going to open up all new use cases in finance, healthcare, legal, consulting, supply chains, and more. \n\nMake sure you’re building something that can take advantage of these upcoming improvements, or you’ll be in a tough spot strategically.\nhttps://x.com/levie/status/2041732610179703100\n\nThe same kinds of productivity gains we've seen in coding with AI agents are heading to the rest of knowledge work. \n\nThis is the jump when you go from having a chatbot to being able to actually have an agent go off and do work for minutes or even hours and come back with a complete work output that you then review.\n\nHere's an example of the new Box Agent filling out an RFP response from an existing knowledge base. This process would normally take hours to fill out, and requires the full attention of the user doing the work. Now, you provide the Box Agent with the RFP questions, and it will go off, make a plan, extract all the relevant questions, read through existing source material to come up with an answer, and then generate a new word document as the final output. All while you're doing something else.\n\nThe key to this architecture is that the agent is able to use all of the same tools in the background that a user uses to get work done. The agent can search for documents, read entire files, run scripts and tools in the background, and even be able to write code on the fly to automate tasks it hasn't seen before. And best of all, the Box Agent will (soon) work from the Box MCP and CLI so you can invoke it in any agentic system as a step in a process.\n\nThis kind of agent complexity would have been impossible even 6 months ago. Models consistently failed at tracking long running tasks or using the right tools at the right moment for the task. But this is all now possible because of models like GPT-5.4, Opus 4.6, and Gemini 3, and is only getting better by the month.\n\nJust as we moved from engineers writing code and using AI as an assistant to answer questions, in many areas of knowledge work -like legal, finance, consulting, sales, marketing, and more- when we have a problem we'll just kick off the AI agent to just go work on it for us in the background.\nhttps://x.com/levie/status/2041512156693201176\n\n**Ryo Lu** — Design @Cursor_ai. Early @NotionHQ, @Stripe, built startups. I make a world where anyone can make software. Aspiring k-pop idol.\n\nno extra buttons \njust click, draw, chat\nfully in flow https://t.co/oUEZLgDpHO\nhttps://x.com/ryolu_/status/2041564082034372956\n\n**Garry Tan** — President & CEO @ycombinator —Founder @garryslist—Creator of GStack—designer/engineer who helps founders—SF Dem accelerating the boom loop—Loves using emdashes\n\nOh man Yahoo Tech... you got so close. You almost had it.\n\nBetter luck next time! https://t.co/yYmLHeQIOP\nhttps://x.com/garrytan/status/2041750093414731888\n\nI like how Claude Code allows bash so the agent can’t use Write File tool outside its workspace but it can seemingly “cat &gt;&gt;” to any file in the file system https://t.co/DKrCZ8Kh1Z\nhttps://x.com/garrytan/status/2041654662764609735\n\nWe live in LISPy times for a specific reason: code is data and data is code again\n\nBut the weird thing? It’s Markdown.\nhttps://x.com/garrytan/status/2041653129020936328\n\n**Zara Zhang** — Builder. Dangerously skips permissions. Harvard’17. GitHub: https://t.co/KCuEajezlL YouTube: https://t.co/8xzbGWtf6w\n\nSkill: https://t.co/WP0b4wfNKJ\nhttps://x.com/zarazhangrui/status/2041736976630739000\n\nIntroducing the Personalized Podcast skill: Turn anything into a podcast with 2 AI hosts, publish it as an RSS feed, and listen to the show in your favorite podcast app on the go\n\nI've been remixing my meeting transcripts into podcasts where the AIs \"eavesdrop\" on my conversation & comment on their impression of me. It's insane\n\nThis is the age of \"content for one\"\n\nLink below\nhttps://x.com/zarazhangrui/status/2041736869998948528\n\n**Nikunj Kothari** — partner @fpvventures - investing in seed/A. previous: early hire @meter, @opendoor, @atlassian & others. love @shimoleejhaveri + 👦👧\n\nAt some point, early stage founders decided to optimize for views and funding instead of eral Partner @SouthPkCommons, Co-Founder @Bevel_Health | Ex: Early Eng @facebook, CTO @Dropbox, Board @Flipkart | Optimist, Builder, Dad\n\nThis new Mythos model is absurd.\n\nWhat a time to be alive.\n\nWhether you invest or you build -- please take a moment to appreciate what an incredible time we live in.\nhttps://x.com/adityaag/status/2041771160359375001\n\nA  lot of the conversation circa 2009 was about making the web 2.0 read/write and malleable.\n\nWe are living through that today but for all software. \n\nWhat if all software could be forked, changed, re-mixed and customized?\nhttps://x.com/adityaag/status/2041658196813869414\n\n**Sam Altman** — AI is cool i guess\n\nTo celebrate 3 million weekly codex users, we are resetting usage limits.\n\nWe will do this every million users up to 10 million.\n\nHappy building!\nhttps://x.com/sama/status/2041658719839383945\n\n## 播客\n\n**Latent Space** — Extreme Harness Engineering for Token Billionaires: 1M LOC, 1B toks/day, 0% human code, 0% human review — Ryan Lopopolo, OpenAI Frontier &amp; Symphony\n\nhttps://www.youtube.com/@LatentSpacePod\n\n---\n\n*本期概览：17 位 builders，35 条推文*\n\nGenerated through the Follow Builders skill: https://github.com/zarazhangrui/follow-builders\n"</script>
