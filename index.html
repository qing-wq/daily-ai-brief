  <script id="digest-data" type="application/json">"🤖 AI Builders Digest — 2026年4月4日\n\n追踪 AI 领域顶尖 Builder 的最新思考与动态\n\n---\n\n**X / Twitter**\n\n**Andrej Karpathy** — 前 Tesla AI 总监、OpenAI 创始团队\n分享了他最近利用 LLM 构建个人知识库的工作流：用 LLM 将原始文档\"编译\"成 .md wiki，通过 Obsidian 作为前端管理，在上面做 Q&A、linting（健康检查）、发现数据不一致性，甚至 vibe code 了一个小型搜索引擎。核心洞察是：大部分 token 消耗不是在操作代码，而是在操作知识。趋势是 raw data → LLM 编译 wiki → LLM 通过 CLI 操作 wiki 做研究和增强。最终方向是合成数据生成 + fine-tuning，让 LLM\"知道\"这些知识而不仅是上下文窗口。\nhttps://x.com/karpathy/status/2039805659525644595\n他还提到：未来每个对前沿 LLM 的查询都可能催生一个 LLM 团队，自动构建整个 ephemeral wiki，循环 lint 后写出一份完整报告，远远超出简单的 .decode()。\nhttps://x.com/karpathy/status/2039808711452246261\n\n**Aaron Levie** — Box CEO\n总结了构建 AI Agent 最大的教训：必须对架构\"毫不留情\"。模型能力快速提升后，之前为弥补模型不足而建的 scaffolding（护栏、分块策略等）反而成了约束。循环是：建系统弥补模型 → 模型变强后这些系统多余/有害 → 拆除旧 scaffolding → 新能力出现 → 重复。核心观点：不要对已建的技术产生留恋，始终紧跟前沿能力。\nhttps://x.com/levie/status/2039931799414194621\n\n**Ryo Lu** — Cursor 设计负责人\n阐述 Cursor 的核心理念\"Glass vs. Black Box\"：传统 terminal 是透明的，但 AI 成了黑盒——你输入愿望，机器交付结果，你接受或拒绝，看不到过程。Cursor 要做\"玻璃\"：Agent 可见、diff 可见、plan 可编辑、状态清晰。你可以在任何时候介入、接管、按自己方式工作。AI 越强大，\"玻璃\"越重要——不是因为需要监视每一步，而是因为最好的成果来自人与模型共同思考。\nhttps://x.com/ryolu_/status/2039895634313187619\n\n**Sam Altman** — OpenAI CEO\nTBPN 是他最喜欢的科技节目，希望 TBPN 继续做下去，也希望他们对自己不会手软，并表示会偶尔配合做出一些愚蠢的决定来让节目更有看点。\nhttps://x.com/sama/status/2039773740586918137\n\n**Peter Steinberger** — OpenClaw 作者\n分享了一个令人担忧的预测：Linux 内核安全漏洞报告数量近年来暴增——两年前每周 2-3 个，去年每周约 10 个，而今年年初以来每天 5-10 个。唯一的变化是 AI 生成的代码（\"AI slop\"）。大部分报告其实是正确的，导致不得不招募更多 maintainer 来处理。这是 AI 编程能力提升带来的一个意想不到的副作用。\nhttps://x.com/steipete/status/2039782190838686088\n\n**Amjad Masad** — Replit CEO\n宣布在盐湖城开设销售办公室，并推荐了几个无设置门槛的企业级 auth 解决方案。\nhttps://x.com/amasad/status/2039777772701413396\nhttps://x.com/amasad/status/2039774118443421887\n\n**Claude** — Anthropic\nClaude Code Desktop 和 Claude Cowork 的 Computer Use 功能现已支持 Windows 平台。\nhttps://x.com/claudeai/status/2039836891508261106\n\n---\n\n**🎙️ 播客**\n\n**Training Data × Jason Kelly** — Ginkgo Bioworks 创始人 & CEO\n\n核心洞察：生物技术正在被 AI 彻底改变游戏规则，但变革的方式和多数人想象的不同。\n\nKelly 认为过去 30 年所有科技革命（互联网、社交媒体）对生物技术毫无意义——只是改善了沟通和办公效率。但 AI 这波不一样，它将改变科学本身的基础。他提出的关键问题是：AI 模型能做实验科学家的工作吗？答案是\"能\"——Ginkgo 与 OpenAI 的合作项目证明了这一点：给模型一个机器人实验室和 6 轮实验循环（每轮 30,000 个实验），它优化了细胞无蛋白合成效率，比 state of the art 高出 40%。\n\nKelly 描绘了一个极具冲击力的未来图景：100 个 AI 科学家共同操作一个机器人实验室，每天实时共享数据，每周输出一份研究简报。他特别指出了当前科研体系的两个低效：①信息共享极慢（论文每年发布一次），②实验室设备利用率低于 20%。AI + 自动化实验室能将数据产出效率提升 10 倍，即使 AI 比科学家笨，仅凭速度就能赢。\n\n关于人形机器人，Kelly 持否定态度——实验室里最需要的不是能走路的机器人，而是高效的样本传输系统和智能液体处理。关于 AI 在生物领域的应用，他预测近期最大的机会在：GLP-1 类药物（消费级健康）、每周血液分子检测（个性化健康监测），以及最终——让人人都能像程序员一样\"编程\"生物学。\nhttps://www.youtube.com/playlist?list=PLOhHNjZItNnMm5tdW61JpnyxeYH5NDDx8\n\n---\n\n*本期概览：12 位 builders，26 条推文，1 期播客*\n\nGenerated through the Follow Builders skill: https://github.com/zarazhangrui/follow-builders\n"</script>
