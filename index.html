  <script id="digest-data" type="application/json">"# AI Builders Digest — 2026年4月12日星期日\n\n追踪 AI 领域顶尖 Builder 的最新思考与动态\n\n---\n\n## X / Twitter\n\n**Peter Yang** — I share extremely practical AI tutorials and interviews | Join 140K+ readers at https://t.co/XYKTmGVH14 | Product at Roblox\n\nObservations about Chinese AI work culture:\n\n1. Many arrive at work late (11 am) and work until late at night (11 pm).\n\n2. Due to the schedule above, many employees are young. Hard for parents to sustain the same schedule. \n\n3. Everyone at these companies is using the best US AI tools like Claude Code via VPN. VPN is very common even for folks not working in tech. \n\n4. Younger generation doesn’t really drink, smoke, or party much. Many just work all the time and order food and boba delivery to office. \n\n5. Government is very supportive of AI startups including cities competing for the best AI founders to start companies locally. Beijing seems to be main AI hub. \n\n6. Youth employment is still bad so gov is also encouraging OPC (one person companies) via subsidies and incentives.\n\nWould love to hear other people’s perspectives on the above.\nhttps://x.com/petergyang/status/2042772055905689977\n\n**Nan Yu** — head of product @linear\n\nskillshare would be such a sick domain to have now\nhttps://x.com/thenanyu/status/2042643133003919689\n\n**Thariq** — Claude Code @anthropicai.   prev YC W20, mit media lab. \n\nA few questions on plan vs ultraplan. \n\nI think the insight here is that implementation can sometimes require a local environment/interactivity, but planning can happen in the cloud since it's mostly about reading code &amp; understanding intent.\nhttps://x.com/trq212/status/2042673325139427724\n\nUltraplan uses roughly the same number of tokens (and subscription rate limits) as plan mode.\n\nSee the docs for more: https://t.co/42xCfg7ecN\nhttps://x.com/trq212/status/2042671371684319723\n\nNew in Claude Code: /ultraplan\n\nClaude builds an implementation plan for you on the web. You can read it and edit it, then run the plan on the web or back in your terminal.\n\nAvailable now in preview for all users with CC on the web enabled.\nhttps://x.com/trq212/status/2042671370186973589\n\n**Amjad Masad** — ceo @replit. civilizationist\n\nTwo years ago on Tucker’s show I talked about how the AI doomers “rationalist” ideology will eventually lead to violence. \n\nAnd sure enough the alleged Sam Altman Molotov attacker appears to be a believer and maybe even an active participant in those communities. https://t.co/R0T9Awg0A6\nhttps://x.com/amasad/status/2042833728305795370\n\nThe Molotov attacker appears to be a “rationalist” type. https://t.co/5yLRzJb3gC\nhttps://x.com/amasad/status/2042828434439835987\n\nBe funny if the only hope for free American enterprise is China’s open models and European regulation of platforms like Apple. https://t.co/SCp8n6ERkL\nhttps://x.com/amasad/status/2042824079129096368\n\n**Guillermo Rauch** — @vercel CEO\n\n🦞 + ▲ https://t.co/yoAbRqAZWa\nhttps://x.com/rauchg/status/2042824091984658902\n\n**Aaron Levie** — ceo @box - your business lives in content. unleash it with AI\n\nThe more I meet enterprise CIOs and AI leaders outside of tech, the more it’s obvious that if you’re building software that doesn’t have a great headless mode, you’re going to be at risk in the coming years.\n\nAsked a group of 20 IT leaders across banking, media, finance, and healthcare if they will have any vendors left in 3-5 years that don’t have a good API option for their service and it was a unanimous “no”.\n\nThis is clearly going to change the nature of software going forward. You have to be completely comfortable serving up your value proposition as much through agent on or off your platform, as you are your own interface. I suspect most platforms will make it to the other side because of how forceful the trend will be, but of course some won’t if their heads in the sand. \n\nBut on the other end, the upside is that in a world of 100X+ more agents doing work with with software than people ever did, there are far more use-cases to drive and be a part of. In many ways it’s a renaissance if you’re tied to critical data or workflows because of what customers can now use you for. \n\nIt will certainly force an evolution of business models over time - whether you embed all of this agentic usage in a seat license or make it all consumption based - but dollars will always flow to where value is created. Going to be fun!\nhttps://x.com/levie/status/2042759653281456218\n\n**Garry Tan** — President & CEO @ycombinator —Founder @garryslist—Creator of GStack & GBrain—designer/engineer who helps founders—SF Dem accelerating the boom loop\n\nThe amazing thing about OSS is that it gets better all the time thanks to some wonderful contributors \n\nThanks so much for using GBrain and making this magic thing work https://t.co/D1Gp53ZqWD\nhttps://x.com/garrytan/status/2042838538077770025\n\nThis screenshot is from the \"Developer Experience Empathy Test\" part of /plan-devex-review\n\nThis is what a truly great PM can do. Now anyone can have it. You can just do things now.\nhttps://x.com/garrytan/status/2042827737812078927\n\nYes, this is indeed a somewhat frustrating setup to get OpenClaw + GBrain + LLM Knowledge Wiki talking to your phone. \n\nThese are all things that need to be fixed. We're in the Altair BASIC era of AI agents.\n\n(Screenshot below from underrated GStack skill /plan-DevEx-review) https://t.co/3ljs0JfIDE\nhttps://x.com/garrytan/status/2042827575454822432\n\n**Matt Turck** — VC at @FirstMarkCap.  Host: MAD Podcast; Organizer: Data Driven NYC, Author: MAD Landscape.\n\nThis wonderful conversation with @felixrieseberg is also available on Spotify, Apple Podcasts and here on YouTube:\n\nhttps://t.co/XcJcWwn0qF\nhttps://x.com/mattturck/status/2042638665260671192\n\nClaude Cowork, Mythos, and the Future of Software: my conversation with @felixrieseberg, who leads Cowork at @AnthropicAI \n\n00:00 Intro\n\n01:53 Claude Mythos Preview and the “step-function change”\n\n06:16 Why Anthropic is treating Mythos differently\n\n11:19 The real story behind Claude Cowork’s “10-day” build\n\n12:42 Why Anthropic realized Claude Code needed a non-technical version\n\n15:44 What Claude Cowork actually is\n\n17:03 Under the hood: virtual machines, tools, skills\n\n18:36 Where Cowork’s memory actually lives\n\n19:26 How Cowork connects to files, apps, and the internet\n\n20:45 Why Felix thinks the local computer is under-appreciated\n\n24:49 Trust: how do you get users comfortable with AI agents?\n\n28:45 What UX actually means for AI agents\n\n31:27 Anthropic Cowork's roadmap is only one month long\n\n34:12 Building 100 prototypes \n\n35:10 If execution is free, what becomes the bottleneck?\n\n37:25 Does it come down to taste?\n\n40:12 The hardest part of building Claude Cowork\n\n41:43 Advice for founders building AI agents\n\n44:21 SaaSpocalypse: what’s left for software startups\n\n49:30 Where AI agents are going next\n\n51:20 Regulated industries and enterprise adoption\n\n54:15 Hot takes: what's underrated, overrated, and what Felix would build today\nhttps://x.com/mattturck/status/2042638661389328413\n\n**Zara Zhang** — Builder. Dangerously skips permissions. Harvard’17. GitHub: https://t.co/KCuEajezlL YouTube: https://t.co/8xzbGWtf6w\n\nDon't just ask AI to \"summarize\" a piece of long-form/difficult content. Try these prompts:\n\n1. Remix it into a polished magazine article, preserving the best original quotes\n2. Remix it into a Socratic dialogue between a teacher & a student (representing me)\n3. Based on what you know about me, pick out the insights that I would find the most interesting\nhttps://x.com/zarazhangrui/status/2042846640130920574\n\nThis is the reason that to truly understand AI's capabilities, you almost have to become a builder\n\nGetting your hands on AI coding tools is not just for making money/building a startup/increasing efficiency; it's also the best way to LEARN\n\nLearn to build -&gt; Build to learn https://t.co/NrNkQ378cN\nhttps://x.com/zarazhangrui/status/2042660162574467580\n\nThe old world: Word, Excel, PowerPoint \n\nThe new world: Markdown, CSV/JSON, HTML\nhttps://x.com/zarazhangrui/status/2042513006018601065\n\n**Nikunj Kothari** — partner @fpvventures - investing in seed/A. previous: early hire @meter, @opendoor, @atlassian & others. love @shimoleejhaveri + 👦👧\n\nI was writing a (relatively) long essay on all my learnings of transitioning to a VC ~two years ago.. \n\nBut, decided to whittle it down to a tight 11 bullet point list (some are cliches, but oh so true):\n\n1. Get on the flight -don’t question it.\n\n2. Deals often die on the weekends.\n\n3. If it’s not wired, it’s not done yet.\n\n4. Conviction is never found in the data room.\n\n5. Naïvety is a virtue, not a weakness.\n\n6. In early stage, pick two: founder, market, product -then believe that the third catches up.\n\n7. The right deal at the wrong time is still the wrong deal.\n\n8. In the land of hubris, constraints still reign king.\n\n9. Slow no’s are worse than fast no’s. Way worse. \n\n10. Your last deal should teach you more than your first.\n\n11. Above all else, pick integrity.\n\n---\n\nIf you are an experienced VC, please add more to this.\n\nIf you as a reader are curious about any of these, please ask questions.\n\nGrateful to have this extremely privileged opportunity!\nhttps://x.com/nikunj/status/2042758851074588945\n\nSometimes VCs will ask questions just to test your depth (market, technical, your obsession). \n\nThe best founders (imo) are able to argue both sides of an argument with extreme clarity.\n\nThere’s rarely something VCs ask that should make you *really* think about your business. \n\nIf they do it consistently, try to get them on the cap table!\nhttps://x.com/nikunj/status/2042723383599861817\n\n**Peter Steinberger** — Polyagentmorous ClawFather. Came back from retirement to mess with AI and help a lobster take over the world @openclaw🦞\n\nhttps://t.co/sr0DLHFulq https://t.co/LTLmMQfRES\nhttps://x.com/steipete/status/2042793664947081398\n\nAnyone here who wants to help with WhatsApp CLI? It needs love, and I can't focus on it right now. https://t.co/J28AfwqmeZ\nhttps://x.com/steipete/status/2042684707683365227\n\nMy account got reinstated. Thanks folks!\nhttps://x.com/steipete/status/2042648934238097842\n\n**Dan Shipper** — ceo @every | the only subscription you need to stay at the edge of AI\n\nfirst @every app using Claude Managed agents!! \n\n@TrySpiral https://t.co/LpLNPQkyev\nhttps://x.com/danshipper/status/2042683598801690691\n\nim dead lol https://t.co/8gWLkHOFeZ\nhttps://x.com/danshipper/status/2042662486059475302\n\nwatch on YouTube: https://t.co/AIugzfn3cO\nhttps://x.com/danshipper/status/2042590862534644106\n\n**Aditya Agarwal** — General Partner @SouthPkCommons, Co-Founder @Bevel_Health | Ex: Early Eng @facebook, CTO @Dropbox, Board @Flipkart | Optimist, Builder, Dad\n\nThe implications of \"free\" software are truly hard to wrap my head around.\n\nYou don't like an interface? Just design and push a new one immediately.\n\nPerformance is slow? Just re-factor the data layer with auto-performance optimization.\n\nInsane.\nhttps://x.com/adityaag/status/2042736543891362058\n\nhttps://t.co/uQsiMT86XA\nhttps://x.com/adityaag/status/2042702044000038920\n\nYou're still thinking about SaaS. \n\n@natosaichek is building space cannons. \n\nFew spots left. RSVP. https://t.co/SHdtEyRTxu\nhttps://x.com/adityaag/status/2042702042376921142\n\n**Sam Altman** — AI is cool i guess\n\nI wrote this early this morning and I wasn't sure if I would actually publish it, but here it is:\n\nhttps://t.co/7Dw9UFpeep\nhttps://x.com/sama/status/2042738954550603884\n\n**Claude** — Claude is an AI assistant built by @anthropicai to be safe, accurate, and secure. Talk to Claude on https://t.co/ZhTwG8d1e5 or download the app.\n\nClaude for Word shares context with Claude for Excel and Claude for PowerPoint, so Claude can work across your open documents in a single conversation.\n\nRead more: https://t.co/MJ89c4IuTt\nhttps://x.com/claudeai/status/2042670343173574705\n\nClaude for Word is now in beta.\n\nDraft, edit, and revise documents directly from the sidebar. Claude preserves your formatting, and edits appear as tracked changes.\n\nAvailable on Team and Enterprise plans. https://t.co/tl1mZVELNg\nhttps://x.com/claudeai/status/2042670341915295865\n\n## 播客\n\n**The MAD Podcast with Matt Turck** — Anthropic’s Felix Rieseberg: Claude Cowork, Mythos, and the SaaS Extinction\n\nhttps://www.youtube.com/@DataDrivenNYC/videos\n\n---\n\n*本期概览：15 位 builders，32 条推文*\n\nGenerated through the Follow Builders skill: https://github.com/zarazhangrui/follow-builders\n"</script>
