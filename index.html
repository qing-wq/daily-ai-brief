  <script id="digest-data" type="application/json">"# AI Builders Digest — 2026年4月10日星期五\n\n追踪 AI 领域顶尖 Builder 的最新思考与动态\n\n---\n\n## X / Twitter\n\n**Josh Woodward** — VP, @Google @GoogleLabs @GeminiApp @GoogleAIStudio\n\nMost Al chatbots give you basic \"projects.\" Gemini just built you a second brain. 🧠\n\nIntroducing Notebooks: some of the magic from @NotebookLM, integrated directly into @GeminiApp.\n\nHere's what changes for you today:\n\n📚 Upload 100 sources for free\n\n📂 Organize your chats - the wait is officially over :)\n\n🔄 Sources, chats, and emojis sync\n\nPeople are using Gemini and NotebookLM in tandem, and we'll keep building both.\n\nTo manage capacity, we're rolling this out NOW on the web and going from Ultra ➡️ Pro ➡️ Plus ➡️ Free. (Mobile, EU, and Workspace are up next!)\n\nWith Google I/O right around the corner, we are just getting started. Enjoy!\nhttps://x.com/joshwoodward/status/2041982173402821018\n\n**Kevin Weil** — VP Science @OpenAI, BoD @Cisco @nature_org, LTC @USArmyReserve\n\nFive Erdos problems at once! The proofs are getting more elegant as the models improve 👀 https://t.co/imzDQJyQbC\nhttps://x.com/kevinweil/status/2042073869880848481\n\n**Peter Yang** — I share extremely practical AI tutorials and interviews | Join 140K+ readers at https://t.co/XYKTmGVH14 | Product at Roblox\n\nTitles don’t matter https://t.co/K8RtB3B4Wr\nhttps://x.com/petergyang/status/2042118898603192489\n\nSupport my friend Aadit's new company - great name btw :) https://t.co/rc1WgqG5p1\nhttps://x.com/petergyang/status/2041996329703092582\n\nAs much as I love using Claude Max and ChatGPT Pro, I don't think these all-you-can-use AI subscriptions will last forever.\n\nHere's my new deep dive that covers:\n\n→ Why Anthropic cut off OpenClaw access\n→ How to run local models on your Mac\n→ What I'm seeing on the ground in China\n\n📌 Read now: https://t.co/cm9jYIZS8y\nhttps://x.com/petergyang/status/2041989206495653915\n\n**Thariq** — Claude Code @anthropicai.   prev YC W20, mit media lab. \n\nwould like to start with people I know already so we can get over initial awkwardness!\nhttps://x.com/trq212/status/2042005754262208708\n\nI want to do some streams where I work with non-technical people using Claude Code to figure out how they might be able to improve their process. \n\nMy feeling is that just a few tips could make a big difference in efficiency. Any mutuals interested?\nhttps://x.com/trq212/status/2042005043289977232\n\nThe docs are a gold mine, read more here: https://t.co/YajFD7anFX\nhttps://x.com/trq212/status/2041935805590204754\n\n**Amjad Masad** — ceo @replit. civilizationist\n\nThere’s a reason bootstrapped solo businesses are accelerating on Replit… we gave builders entire teams. https://t.co/2c65YDgcpp\nhttps://x.com/amasad/status/2042133509939298511\n\n🔥 https://t.co/B8DRDb8yeY\nhttps://x.com/amasad/status/2041789010335690806\n\n**Guillermo Rauch** — @vercel CEO\n\nAI Gateway is quite literally a “peace of mind” product:\n✅ No downtime\n✅ No lock-in\n✅ No keys \n🆕 No training https://t.co/qdUrf4ds5s\nhttps://x.com/rauchg/status/2041957973531226372\n\nThe best outcome for humanity is many strong AIs competing for the top spot.\n\nVercel is proudly powering https://t.co/ZsS5nRfjIF and the infrastructure that made today's model release possible. https://t.co/a0liuZfANa\nhttps://x.com/rauchg/status/2041922907832807443\n\nThe web's brightest days are ahead.\n\n1️⃣ The web is AI's natural medium. LLMs are proficient in web tech. The browser is now everyone's IDE. No 'App Store' bs.\n\n2️⃣ As we approach coding superintelligence, powerful low-level web APIs are maturing: WebGPU, HTML in Canvas, WebAssembly. The performance ceiling of the web will vanish, and you'll witness the most impressive, whimsical, and multi-dimensional pages and apps.\n\n3️⃣ Generative UI is AI's final form. The web will be the birthplace of \"AGUI\". Each hyperlink providing a just-in-time, beautifully personalized experience.\n\nIf you bet on the web, you bet on the right horse.\nhttps://x.com/rauchg/status/2041883605711122488\n\n**Alex Albert** — Research @AnthropicAI. Opinions are my own!\n\nI've found Managed Agents to somehow be both the fastest way to hack together a weekend agent project and the most robust way to ship one to millions of users.\n\nIt eliminates all the complexity of self-hosting an agent but still allows a great degree of flexibility with setting up your harness, tools, skills, etc.\nhttps://x.com/alexalbert__/status/2041941720611614786\n\n**Aaron Levie** — ceo @box - your business lives in content. unleash it with AI\n\nBackground agents for knowledge work are here. You can use the Box API or MCP to automate any content workflow with Box + Claude Managed Agents. In 2 minutes you can be automating document review processes, data extraction, or connecting content to other IT systems. Crazy times. https://t.co/zfIYubDJye https://t.co/opAihEGx2U\nhttps://x.com/levie/status/2041975669928702370\n\n**Garry Tan** — President & CEO @ycombinator —Founder @garryslist—Creator of GStack—designer/engineer who helps founders—SF Dem accelerating the boom loop—Loves using emdashes\n\nIf you’re taking advice from 1x speed engineers I don’t know what to tell you\n\nDon’t believe the haters. Speed up with us. https://t.co/50fBezfq0p\nhttps://x.com/garrytan/status/2042109985346490483\n\nLegit baller @AnjneyMidha https://t.co/FU4417n34D\nhttps://x.com/garrytan/status/2042081320877408265\n\nThe cool thing about markdown is that the agent itself can decide when a GStack skill will help you\n\nJust make stuff as you might and it’ll trigger as needed https://t.co/7ogoZIhq8H\nhttps://x.com/garrytan/status/2042061979997831556\n\n**Nikunj Kothari** — partner @fpvventures - investing in seed/A. previous: early hire @meter, @opendoor, @atlassian & others. love @shimoleejhaveri + 👦👧\n\nRepo here - fully vibe coded using Opus 4.5: https://t.co/h6T9Neo3NL\n\nAlso props to @andrewfarah for helping sync X bookmarks, @TimFarrelly8 for Substack2Markdown and @kepano for writing File over App three years ago!\nhttps://x.com/nikunj/status/2042021738083766568\n\nInspired by @karpathy & @FarzaTV, introducing LLMwiki.. fully open source to help build yours. \n\nInputs were tweets, bookmarks, iMessage/WhatsApp, and all my writing. \n\nSpent a bunch of time refining the frontend design to make it look great. \n\nEven though every single article here was written by AI, it was able to make surprisingly sharp connections.\n\nTo make yours, just give the repo to Claude Code and it'll guide you!\nhttps://x.com/nikunj/status/2042020992969744702\n\n**Peter Steinberger** — Polyagentmorous ClawFather. Came back from retirement to mess with AI and help a lobster take over the world @openclaw🦞\n\nredemption arc completed 🦞💻 https://t.co/to4t5OHIw4\nhttps://x.com/steipete/status/2042019503907717344\n\nI'm working on character evals and noticed that Claude would constantly pick itself as #1, so I removed the model names from the judge and changed things. https://t.co/Y9SqqJSYRc\nhttps://x.com/steipete/status/2042017534816231486\n\nBoth can be true: I want really powerful local models, I'm also BOMBARDED with emails/messages of people complaining how even the top tier models are not good enough, make mistakes or don't follow instructions well enough.\nhttps://x.com/steipete/status/2041936147450863952\n\n**Dan Shipper** — ceo @every | the only subscription you need to stay at the edge of AI\n\nWe use OpenClaws to do all of our work at @every. \n\nWe have 25 full-time employees, so we’re one of the few companies in the world that has seen how work changes when everyone has their own personal agent in the company Slack.\n\nI chatted with @every COO Brandon (@bran_don_gell) and @every head of platform Willie (@bigwilliestyle) to share what we’ve learned.\n\nWe get into:\n- Why agents become mirrors of their owners, and how that influences how other people on the team interact with them\n- How a parallel AI org chart forms on its own. People have stopped tagging me on Slack with questions about Proof, the document editor I vibe coded, because they knew my agent R2-C2 can step in\n- The etiquette for human-agent collaboration is being invented in real time. Brandon's rule is that if there's an established process or documented answer, always ask the agent, not their human\n- Why everyone is a manager now, and why even experienced managers carry limiting beliefs about what their agents can do\n- This is a must-watch for anyone trying to understand how AI workers change daily operations, not just in theory, but inside a company that’s half-agent \n\nWatch below!\n\nTimestamps\nIntroduction: \nHow Brandon built Zosia, an AI agent to run his household: \nBrandon’s “aha” moment: \nWhat happened when everyone on the team got their own agent: \nHow agents take on their owners' personalities, and why that matters inside an org: \nWhy it’s important for agents to work in public: \nWhat we’re still figuring out when it comes to agent behavior, including memory gaps, group chat etiquette, and the \"ant death spiral\" problem: \nHow we built Plus One, our hosted OpenClaw product: \nThe cultural shift required to make agents work at scale:\nhttps://x.com/danshipper/status/2041903948873777629\n\n@every @brandon @bran_don_gell YouTube: https://t.co/ktbxuuodu5\n\nSpotify: https://t.co/DDMNA60uhJ\nhttps://x.com/danshipper/status/2041895030130909429\n\nRelevant bit of advice: https://t.co/HR0EZ82tsd\nhttps://x.com/danshipper/status/2041878261316120944\n\n**Aditya Agarwal** — General Partner @SouthPkCommons, Co-Founder @Bevel_Health | Ex: Early Eng @facebook, CTO @Dropbox, Board @Flipkart | Optimist, Builder, Dad\n\n\"First you shape the tools, then the tools shape you\".\n\nAt SPC, our entire team is now writing code on a weekly basis. Two months ago, there were only 1-2 people writing code. \n\nThis has been incredible on many levels but the most interesting one is how the tools are now shaping us as a team:\n\n- Everyone has a mindset towards automation and optimization. \n- Latencies for everything are lower.\n- People can focus on the more interesting parts of their roles.\n- The scope of everyone's ambition has exploded\n\nThe key enabler was to make sure that everyone got AI coding-pilled.\n\nIf you are not doing this in your own company, then you are really really missing a beat.\nhttps://x.com/adityaag/status/2041985720706122070\n\n**Claude** — Claude is an AI assistant built by @anthropicai to be safe, accurate, and secure. Talk to Claude on https://t.co/ZhTwG8d1e5 or download the app.\n\nBuild and deploy your agents through the Claude Console, Claude Code, or our new CLI: https://t.co/E9xQ7xd4rG\n\nRead more on the blog: https://t.co/omWjJ4fK88\nhttps://x.com/claudeai/status/2041927700063883281\n\nOn @vibecodeapp_, developers can now spin up agent infrastructure at least 10x faster with Managed Agents, going from a prompt to a deployed app without weeks of setup: https://t.co/YyvozwEc5O\nhttps://x.com/claudeai/status/2041927698210058629\n\n@sentry now takes you from Seer's root-cause analysis to a Claude-powered agent that writes the fix and opens a PR. They built the integration on Managed Agents in weeks: https://t.co/kPd2qFH2IM\nhttps://x.com/claudeai/status/2041927696351994006\n\n## 播客\n\n**AI & I by Every** — We Gave Every Employee an AI Agent. Here's What Happened.\n\nhttps://www.youtube.com/playlist?list=PLuMcoKK9mKgHtW_o9h5sGO2vXrffKHwJL\n\n---\n\n*本期概览：14 位 builders，30 条推文*\n\nGenerated through the Follow Builders skill: https://github.com/zarazhangrui/follow-builders\n"</script>
