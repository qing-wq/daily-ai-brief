  <script id="digest-data" type="application/json">"# AI Builders Digest — 2026年4月13日星期一\n\n追踪 AI 领域顶尖 Builder 的最新思考与动态\n\n---\n\n## X / Twitter\n\n**Swyx** — achieve ambition with intentionality, intensity, integrity & insanity.\n\nlate night low TAM tweet:\n\ndid a Broadway solo song for the first time in ~18 years! only fumbled lyrics once! https://t.co/1Yh31lH68z https://t.co/mi9jwudyFd\nhttps://x.com/swyx/status/2043217991589102027\n\nflew straight back from London town to get ready for my Broadway cabaret tonight !!\n\n(sorry didnt advertise… its v limited seating) https://t.co/H2FS34JwFB\nhttps://x.com/swyx/status/2043095815577833619\n\n**Peter Yang** — I share extremely practical AI tutorials and interviews | Join 140K+ readers at https://t.co/XYKTmGVH14 | Product at Roblox\n\n\"Can AI learn design taste?\"\n\nThere's no better person to ask this question to than Figma's CEO.\n\nI had a great chat with Dylan about this and other tough topics like:\n\n→ Whether design systems constrain creativity\n→ How Figma plans to compete in the AI era\n\n📌 Subscribe to get the full episode tmr: https://t.co/Ggqaa3F11Z\nhttps://x.com/petergyang/status/2042950869734567998\n\n**Thariq** — Claude Code @anthropicai.   prev YC W20, mit media lab. \n\nthere's a turbotax connector in Claude Code now, so glad I procrastinated on taxes 😭 https://t.co/EIOfnPq0xd\nhttps://x.com/trq212/status/2043138221836746762\n\n**Guillermo Rauch** — @vercel CEO\n\nVercel Sandbox is now the #1 fastest microVM-based Sandbox.\n\nWe’ve also heard from customers migrating that beyond “in the lab” benchmarks, our real-world performance & reliability are second-to-none. Literally.\n\nWhether it’s 🦞 claws, coding agents, or plain compute parallelism, we think this is the foundation of the new world. Enjoy!\nhttps://x.com/rauchg/status/2043020059896091016\n\n**Aaron Levie** — ceo @box - your business lives in content. unleash it with AI\n\nThis chart puts the datacenter demands into perspective very clearly. Amazon has done more capex in the last 3 years than its entire history. \n\nRight now most AI adoption is on chat tools that are relatively token efficient. Comparatively, coding agents, use orders of magnitude more tokens, but are only used by a small population today.\n\nThese same kind of consumption patterns are about to come for the rest of knowledge work as well. The demand to process tokens for agents is probably 100s of times greater than we’re realizing right now. \n\nExpect these charts to keep going vertical.\nhttps://x.com/levie/status/2043192337111924930\n\nWe will likely have more lawyers in the future than today, because:\n\n1) AI will cause so many more people to ask legal questions which will encourage them to need to verify or execute through an actual lawyer. \n\n2) AI will cause an explosion of more and more exotic legal terms that lawyers will be spending even more time reviewing redlines or new cases around.\n\n3) All the new areas of law that now are emerging around the use of AI itself in every single industry. AI introduces an explosion of IP, privacy, and regulatory compliance challenges across all verticals.\n\nThis has historical precedent as well. Between the creation of the PC and the internet (both technologies that made the legal profession far more efficient), the ABA pegs active attorneys having gone from roughly 400,000 in 1975 to roughly 1,375,000 in 2025.\n\nWhen we make professions more efficient and automated, often demand for them goes up not down.\nhttps://x.com/levie/status/2043051227387433144\n\n**Garry Tan** — President & CEO @ycombinator —Founder @garryslist—Creator of GStack & GBrain—designer/engineer who helps founders—SF Dem accelerating the boom loop\n\nHere is my counterpoint after 3 months of releasing open source used by tens of thousands of agentic engineers per day. \n\nThin harness, fat skills: \n\nhttps://t.co/K2Sx8Cb4tz\nhttps://x.com/garrytan/status/2043198783006355747\n\nIf your memory dies when your harness dies, you built the harness too thick.\n\nMemory is markdown. Skills are markdown. Brain is a git repo. The harness is a thin conductor — it reads the files, it doesn't own them. https://t.co/JPjnu2FhV6\nhttps://x.com/garrytan/status/2043198780800197025\n\nWhat a powerful education in latency and how to build voice systems \n\n… all just by chatting with the Claw https://t.co/0bHezE7lzW\nhttps://x.com/garrytan/status/2043188801175220306\n\n**Matt Turck** — VC at @FirstMarkCap.  Host: MAD Podcast; Organizer: Data Driven NYC, Author: MAD Landscape.\n\n\"There are some many vendors in AI for customer service, it's basically a solved problem\" https://t.co/Kd8GLBAFPL\nhttps://x.com/mattturck/status/2043114808875077789\n\n**Zara Zhang** — Builder. Dangerously skips permissions. Harvard’17. GitHub: https://t.co/KCuEajezlL YouTube: https://t.co/8xzbGWtf6w\n\nHuman communication will be for\n- deciding what to work on &amp; what \"good\" looks like\n- keeping each other company &amp; preventing loneliness/establishing camaraderie\n- creative brainstorming &amp; bouncing ideas off each other\n\nNot for project syncs, status updates, handovers...\nhttps://x.com/zarazhangrui/status/2043202553538925031\n\nThe most efficient way for humans to collaborate: do not collaborate\n\nOne person should own something end-to-end and work with agents\nhttps://x.com/zarazhangrui/status/2043187721989149146\n\n**Nikunj Kothari** — partner @fpvventures - investing in seed/A. previous: early hire @meter, @opendoor, @atlassian & others. love @shimoleejhaveri + 👦👧\n\nVCs: please take this low valuation since I’m investing in you and my conviction is worth the price. I’m invested for the long long term. \n\n6 months later..\n\nSame VC: take the highest possible valuation because why not. Who cares about the partner or fund name. Less dilution is good. More money is good. (Also it’ll help me show marks to LPs so take it bro please).  \n\nTry to avoid these VCs like the plague. All they care about is their “deals” getting markups. I get it - generating returns is the job. \n\nBut, watch these people also run away when the company is not doing well. All those intros and goodwill suddenly disappear. \n\nTry to get missionaries over mercenaries. And please please please backchannel the person who’ll be joining your cap table!\nhttps://x.com/nikunj/status/2043092455550259341\n\n**Peter Steinberger** — Polyagentmorous ClawFather. Came back from retirement to mess with AI and help a lobster take over the world @openclaw🦞\n\nHarnesses can now been plugins - meaning it'd be trivial to replace the default Pi harness with e.g. Anthropic’s SDK or another custom one.\n\nThis won't magically allow Claude subscription, but it's useful to compare different implementations.\n\nUsing codex as harness will likely weaken personality, but should increase agentic mode to keep the agent working on longer-horizon tasks.\n\nSo far I gated strict mode to GPT since it's not yet tested with other models, but it's trivial to modify that if you use hackable install.\nhttps://x.com/steipete/status/2043136624469619050\n\n2) Native Codex as the OpenClaw harness:\n\nplugins.entries.codex.enabled = true\nagents.defaults.model = \"codex/gpt-5.4\"\nagents.defaults.embeddedHarness = { runtime: \"codex\", fallback: \"none\" }\n\nCodex owns threads, resume, compaction, app-server execution. https://t.co/9DDpY6TMqf\nhttps://x.com/steipete/status/2043136620006961384\n\nTwo experiments in the next @openclaw to address some \"GPT is lazy\" issues: \n1) Strict mode:\n\nagents.defaults.embeddedPi.executionContract = \"strict-agentic\"\n\nThis tells GPT-5.x to keep working: read more code, call tools, make changes, or return a real blocker instead of stopping at “here’s the plan.” https://t.co/QMdeus6Y5J\nhttps://x.com/steipete/status/2043136615640694797\n\n**Aditya Agarwal** — General Partner @SouthPkCommons, Co-Founder @Bevel_Health | Ex: Early Eng @facebook, CTO @Dropbox, Board @Flipkart | Optimist, Builder, Dad\n\nThe big difference between a true \"agent\" and simply running an LLM in a loop (or an event-based trigger) is how you do intelligent long-horizon memory management.\n\nBy far the most interesting aspect of the Claude Code architecture was their 3-tier memory architecture.\nhttps://x.com/adityaag/status/2043144970060939487\n\n## 播客\n\n**No Priors** — The Agentic Economy: How AI Agents Will Transform the Financial System with Circle Co-Founder and CEO Jeremy Allaire\n\nhttps://www.youtube.com/@NoPriorsPodcast\n\n---\n\n*本期概览：11 位 builders，18 条推文*\n\nGenerated through the Follow Builders skill: https://github.com/zarazhangrui/follow-builders\n"</script>
