  <script id="digest-data" type="application/json">"AI Builders Digest — 2026年4月11日\n\nX / Twitter\n\nSam Altman (OpenAI CEO)\nChatGPT Pro 即将推出 100 美元/月的高价套餐。Sam Altman 表示这是\"应大众强烈需求\"推出的。\nhttps://x.com/sama/status/2042342572958630332\n\nAnthropic 官方 (@claudeai)\nAnthropic 在 Claude Platform 上线了新的 Advisor Tool：让 Sonnet 在遇到难题时可以调用 Opus 作为顾问。在 SWE-bench Multilingual 评测中，使用 Opus 顾问的 Sonnet 得分提升了 2.7 个百分点，同时每个任务成本降低了 11.9%。\nhttps://x.com/claudeai/status/2042308627478773808\n\nAndrej Karpathy (前 OpenAI 创始团队、斯坦福 PhD、特斯拉前 AI 总监)\nKarpathy 指出 AI 认知存在严重分层：大多数普通人用的是旧的、免费版的 ChatGPT，感受不到进步；而专业程序员用 Codex 和 Claude Code，能亲眼目睹\"几天甚至几周的工作量在一个小时内被消化\"的震撼。他强调，最新模型的编程能力提升已不能用\"增量\"来形容，而是一场\"staggering\"的革命。\nhttps://x.com/karpathy/status/2042334451611693415\n\nAmjad Masad (Replit CEO)\n对编程 Agent 的能力提升表示强烈认同。\nhttps://x.com/amasad/status/2042332588308906118\n\nAaron Levie (Box CEO)\nLevie 认为整个社会严重低估了 AI 自动化在\"非典型软件\"领域的总需求量。他指出：大多数公司受制于工程师数量，无法将自动化引入运营的每个角落；AI Agent 降低了成本，使得过去\"技术上不可行\"的任务——尤其是涉及非结构化数据和复杂数据流连接的工作——现在都可以实现了。CPG、零售、医药研究、银行分析、医疗流程……每个领域都会爆发。\nhttps://x.com/levie/status/2042469771275329594\n\nGuillermo Rauch (Vercel CEO)\nRauch 提出\"Agentic Infrastructure 是云的未来\"：① 编程 Agent 需要\"为 Agent 打造\"的基础设施，而不只是为开发者；② Pages → Agents，长时运行计算、沙箱、Token 交付网络是新软件的构建模块；③ Vercel 本身也在向自配置、自修复、自优化的 Agent 形态演进。\nhttps://x.com/rauchg/status/2042358253510963384\n\nJosh Woodward (Google Gemini 副总裁)\nGemini 上线 50 天内已生成超过 1 亿首歌曲，现在解锁 Lyria 3 模型，每天可生成最多 5 首完整歌曲（约 3 分钟/首）。\nhttps://x.com/joshwoodward/status/2042318148851188151\n\nThariq (Claude Code @ Anthropic)\n分享了一个高杠杆使用技巧：明确告诉 Claude Code\"使用 Monitor Tool 观察错误\"，可以让 Agent 在长时间运行任务时自我监控。他同时指出，prompting 将成为一门像写作、演讲一样的高杠杆技能——本质上是\"与 Agent 对话\"的艺术。\nhttps://x.com/trq212/status/2042335178388103559\n\nAlex Albert (Anthropic Research)\n分享了一个有趣的发现：允许 Sonnet\"打电话给朋友\"（调用 Opus）不仅提升了性能，还因为减少了复杂任务的 Token 消耗，总成本反而下降了。\nhttps://x.com/alexalbert__/status/2042329150086922574\n\nCat Wu (Claude Code @ Anthropic)\n宣布 Claude Code 接入 Bedrock 和 Vertex 的配置体验大幅优化。\nhttps://x.com/_catwu/status/2042345489778331915\n\nRyo Lu (Cursor Design)\nCursor 在设计哲学上坚持\"少即是多\"。\nhttps://x.com/ryolu_/status/2042311143788892496\n\nGarry Tan (Y Combinator CEO)\n开源了 GBrain——让 OpenClaw/Hermes Agent 能够实现对 10000+ Markdown 文件的完美全量记忆，MIT 许可证。\nhttps://x.com/garrytan/status/2042497872114090069\n\nZara Zhang (follow-builders 作者)\n分享了一个有趣的个人洞察：AI 对自己最有价值的部分是在\"舒适区之外\"（比如编程），而不是在\"舒适区内\"（比如写作）——因为她对写作本身就很享受，AI 介入反而增加迭代成本。\nhttps://x.com/zarazhangrui/status/2042379962339246105\n\n播客\n\nUnsupervised Learning — OpenAI 首席科学家 Iko Paioki 深度对话\n在本期节目中，OpenAI 首席科学家 Iko Paioki 与主持人 Jacob Efron 探讨了 AI 研究的多个前沿话题。\n\n核心要点：\n• 关于时间线：OpenAI 曾在去年宣布目标在 2025 年 9 月达到\"研究级 interim 能力\"，2028 年 3 月实现完全自动化 AI 研究员。Paioki 表示，代码工具的爆发性增长和数学/物理研究的突破让他对这条路线\"很有信心\"。\n• 关于 RL 的边界：在代码和数学这类\"可验证\"领域，RL 已经取得惊人进步；向医疗、法律、金融等\"难以验证\"的领域扩展，是下一个前沿，核心挑战是教会模型评估\"长期任务中的阶段性进展\"。\n• 关于 AI for Science：模型已经在 IMO 难度的数学问题上取得突破，甚至能给出让 Paioki 本人感到\"花一周想出来会很骄傲\"的证明思路。但他强调，AI 不会颠覆科学家的工作方式，而是成为\"人机协作\"的科学伙伴。\n• 关于对齐研究：Paioki 最重要的工作之一是\"链式思维监控\"——reasoning model 的思考过程本身就是一个强大的可解释性工具，而且随着 Agent 工作时间延长，这种可解释性会\"同比扩展\"。\n• 关于 AGI 时间线：他的判断是，\"我们离得很近了\"（not that far）。模型还达不到全维度超越人类，但已经足够具有变革性。\n• 对社会的建议：AI 自动化大量知识工作会带来财富集中和就业结构的深层挑战，这不仅是技术问题，需要政策制定者介入。\n\n一句话总结：Paioki 认为 AI 的真正飞跃不是取代人类，而是成为\"值得信赖的研究伙伴\"，而对齐的答案可能就藏在模型的思维链里。\nhttps://www.youtube.com/@RedpointAI\n\n—\nGenerated through the Follow Builders skill: https://github.com/zarazhangrui/follow-builders\n"</script>
